id: hdfc-6e-rewards
name: 6E Rewards IndiGo HDFC Bank Credit Card
issuer: hdfc
network: visa
network_tier: platinum
tier: entry
card_type: credit
co_brand:
  partner: IndiGo
  category: airline
  partner_website: https://www.goindigo.in
status: active
launched_on: 2022-11-07
discontinued_on: null

# Entry-level IndiGo 6E Rewards co-brand from HDFC Bank. The companion XL
# variant was discontinued in Nov-2025 but this base variant continues to
# be issued. Unlike the newer Axis/Kotak/SBI/IDFC partnerships which use
# IndiGo's newer BluChip currency, this card still earns "6E Rewards" that
# auto-convert to BluChip at 1:1 on redemption.

fees:
  - effective_from: 2022-11-07
    effective_until: null
    joining_fee_inr: 500
    annual_fee_inr: 500
    fee_waiver:
      spend_inr: 150000
      cycle: annual
      conditions: "Renewal fee waiver on retail spends of ₹1.5L in the preceding year."
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.6
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    source:
      url: https://www.hdfcbank.com/personal/pay/cards/credit-cards/6e-rewards-indigo-hdfc-bank-credit-card/fees-and-charges
      retrieved_on: 2026-04-22
      notes: "Joining + annual fee ₹500 per HDFC fees page. Rewards redemption fee of ₹99 per claim applies separately on top."

rewards:
  - effective_from: 2022-11-07
    effective_until: null
    currency: miles
    currency_name: 6E Rewards
    base:
      rate: 1
      per_inr: 100
      unit_value_inr: 1.0
      unit_value_inr_realized: 0.5
    accelerated:
      - category: indigo-flights-direct
        canonical_categories: [travel]
        multiplier: 1
        effective_rate: 2.5
        card_attributable_rate: 2.5
        card_attributable_per_inr: 100
        stacks_with_program: false
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        merchants: [indigo-web, indigo-app]
        channel:
          required: true
          class: cobrand-merchant
          merchants: [indigo-app, indigo-web]
        notes: "2.5 6E Rewards per ₹100 on flight bookings made via IndiGo website or app."
      - category: dining-grocery-entertainment
        canonical_categories: [dining, groceries, entertainment]
        multiplier: 1
        effective_rate: 2
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
      - utilities
    redemption:
      - type: voucher
        program: IndiGo flights + 6E Prime add-ons
        rate_inr_per_unit: 1.0
        fee_inr: 99
        constraints: "Redeemable only for IndiGo bookings and 6E Prime add-ons at 6E Reward = ₹1. Unused balance auto-converts to BluChip at 1:1 if IndiGo migrates the balance. Redemption fee ₹99 + GST per claim."
    source:
      url: https://www.paisabazaar.com/hdfc-bank/6e-rewards-indigo-hdfc-bank-credit-card/
      retrieved_on: 2026-04-22

benefits:
  - effective_from: 2022-11-07
    effective_until: null
    lounge_access: null
    welcome:
      - condition: "Joining fee paid + minimum 3 transactions in each of the first 3 months"
        benefit: "IndiGo flight-ticket voucher worth ₹1,500 + 1 × 6E Prime add-on worth ₹1,099"
        value_inr: 2599
        window_days: 90
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 400
      max_txn_inr: 5000
      cap_per_cycle_inr: 250
      cycle: statement
    other:
      - name: 6E Prime add-on on welcome
        description: One complimentary 6E Prime add-on (choice of priority check-in, seat, meal, or assistance) worth ₹1,099 on first-use.
        value_inr: 1099
    concierge: false
    source:
      url: https://www.paisabazaar.com/hdfc-bank/6e-rewards-indigo-hdfc-bank-credit-card/
      retrieved_on: 2026-04-22
      notes: "Entry-level variant — no complimentary lounge access."

eligibility:
  min_age: 21
  max_age: 60
  income_inr_annual:
    salaried: 300000
    self_employed: 600000
  credit_score_min: 720
  residency: resident-indian

application:
  apply_url: https://www.hdfcbank.com/personal/pay/cards/credit-cards/6e-rewards-indigo-hdfc-bank-credit-card
  replaces_card: null

metadata:
  last_verified_on: 2026-04-22
  tags: [co-branded, airline, indigo, entry, miles]
