    effective_until: 2024-04-19
    currency: points
    currency_name: EDGE Reward Points
    base:
      rate: 10
      per_inr: 200
      unit_value_inr: 0.2
      unit_value_inr_realized: 0.18
    accelerated:
      - category: dining-international
        canonical_categories: [dining, international]
        effective_rate: 20
        cap_per_cycle: "unlimited"
        cap_unit: points
        cycle: monthly
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - government
      - insurance-premiums
    redemption:
      - type: catalog
        program: EDGE Rewards
        rate_inr_per_unit: 0.2
      - type: airmiles
        program: Multiple (EDGE transfer)
        ratio: "5:2"
    source:
      url: https://www.axisbank.com/retail/cards/credit-card/select-credit-card
      retrieved_on: 2026-04-15
      notes: "Historical record; dining+international 2X era, ended by the 20-Apr-2024 revision."

  - effective_from: 2024-04-20
    effective_until: null
    currency: points
    currency_name: EDGE Reward Points
    base:
      rate: 10
      per_inr: 200
      unit_value_inr: 0.2
      unit_value_inr_realized: 0.18
    accelerated:
      - category: monthly-spend-first-20k
