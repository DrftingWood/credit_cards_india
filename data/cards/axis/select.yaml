        cap_per_cycle: 2000
        cap_unit: points
        cycle: monthly
        notes: "20 EDGE points per ₹200 on the first ₹20,000 spend each month (max 2,000 accelerated points), then base 10/₹200. The earlier dining+international accelerator was withdrawn."
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - government
      - insurance-premiums
    redemption:
      - type: catalog
