id: kotak-white-reserve
name: Kotak White Reserve Credit Card
issuer: kotak
network: mastercard
network_tier: world
tier: super-premium
card_type: credit
co_brand: null
status: active
launched_on: 2020-01-01
discontinued_on: null

fees:
  - effective_from: 2020-01-01
    effective_until: null
    joining_fee_inr: 12500
    annual_fee_inr: 12500
    fee_waiver:
      spend_inr: 1000000
      cycle: annual
    forex_markup_pct: 2.0
    finance_charge_monthly_pct: 3.5
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    source:
      url: https://cardinsider.com/kotak/kotak-white-reserve-credit-card/
      retrieved_on: 2026-06-12
      notes: "2026-06 corrections: fee is ₹12,500 + GST (was wrongly ₹3,000); waiver ₹10L (was ₹7.5L)."

rewards:
  - effective_from: 2020-01-01
    effective_until: null
    currency: cashback
    currency_name: Whites Pass
    base:
      rate: 0
      per_inr: 100
      unit_value_inr: 1.0
    capping_rules:
      - "No per-transaction reward earn — value accrues only via the milestone-based White Pass programme (see benefits.milestones)."
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
      - utilities
    redemption:
      - type: catalog
        program: Whites Catalogue
        rate_inr_per_unit: 1.0
        constraints: "Whites Pass redeemable on curated lifestyle catalogue."
    source:
      url: https://cardinsider.com/kotak/kotak-white-reserve-credit-card/
      retrieved_on: 2026-06-12
      notes: "2026-06 rewrite: the 1.5% base + 3% international cashback model was wrong — the card has no per-transaction earn; White Pass milestones carry the value."

benefits:
  - effective_from: 2020-01-01
    effective_until: null
    lounge_access:
      domestic:
        visits_per_cycle: unlimited
        cycle: annual
        guests_per_visit: 0
        via: [mastercard, dreamfolks]
        notes: "Unlimited for primary and add-on cardholders."
      international:
        visits_per_cycle: unlimited
        cycle: annual
        guests_per_visit: 0
        via: [priority-pass]
        notes: "Unlimited for primary and add-on cardholders."
    golf:
      rounds_per_cycle: 2
      cycle: monthly
      lessons_per_cycle: 0
    milestones:
      - spend_inr: 300000
        cycle: annual
        benefit: "White Pass worth ₹5,000 (scales with spend tiers up to ₹2.5L value at ₹1Cr annual spend)"
        value_inr: 5000
    welcome:
      - condition: "Joining fee paid"
        benefit: "Complimentary Club Marriott membership"
        window_days: 90
    insurance:
      - type: air-accident
        sum_insured_inr: 15000000
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 400
      max_txn_inr: 7500
      cap_per_cycle_inr: 4500
      cycle: annual
    concierge: true
    source:
      url: https://cardinsider.com/kotak/kotak-white-reserve-credit-card/
      retrieved_on: 2026-06-12
      notes: "2026-06 rewrite: lounge is unlimited (was 8+12); welcome is Club Marriott; White Pass milestone ladder added (top tiers not individually modelled)."

eligibility:
  min_age: 21
  max_age: 65
  income_inr_annual:
    salaried: 3000000
    self_employed: 3000000
  credit_score_min: 780
  residency: resident-indian

application:
  apply_url: https://www.kotak.com/en/personal-banking/cards/credit-cards/white-reserve-credit-card.html

metadata:
  last_verified_on: 2026-06-12
  tags: [super-premium, lifestyle, travel, whites-pass]
