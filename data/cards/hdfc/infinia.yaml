rewards:
  - effective_from: 2017-01-01
    effective_until: 2025-07-31
    currency: points
    currency_name: Reward Points
    base:
      rate: 5
      per_inr: 150
      unit_value_inr: 1.0
      unit_value_inr_realized: 0.7
    accelerated:
      - category: smartbuy-flights-hotels
        canonical_categories: [travel]
        multiplier: 10
        cap_per_cycle: 15000
        cap_unit: points
        cycle: monthly
        channel:
          required: true
          class: issuer-portal
          merchants: [smartbuy]
