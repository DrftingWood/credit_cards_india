      cycle: annual
      lessons_per_cycle: 0
      notes: "8 rounds/lessons per year + 1 additional per ₹50,000 spend."
    welcome:
      - condition: "Joining fee paid"
        benefit: "2,500 EDGE Miles + Taj/ITC vouchers worth ₹10,000 (also on renewal)"
        value_inr: 11250
        window_days: 90
    insurance:
      - type: air-accident
        sum_insured_inr: 50000000
