        canonical_categories: [groceries, utilities]
        effective_rate: 5
        cap_per_cycle: 400
        cap_unit: points
        cycle: monthly
        notes: "5% as Reward Points on grocery/utility/departmental, capped 400 RP/month (~₹100). Dining is NOT included (earlier data wrongly included it)."
    exclusions:
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
    redemption:
      - type: statement-credit
        rate_inr_per_unit: 0.25
