id: kotak-indigo-ka-ching-6e-rewards-xl
name: IndiGo Kotak Ka-ching 6E Rewards XL Credit Card
issuer: kotak
network: mastercard
network_tier: world
tier: premium
card_type: credit
co_brand:
  partner: IndiGo
  category: airline
  partner_website: https://www.goindigo.in
status: active
launched_on: 2024-07-01
discontinued_on: null

# Premium variant of the Kotak × IndiGo partnership — launched after HDFC
# discontinued its own 6E Rewards co-brands. Distinctive because it earns
# 6E Rewards on *fuel* spends (most cards exclude fuel from rewards).

fees:
  - effective_from: 2024-07-01
    effective_until: null
    joining_fee_inr: 2500
    annual_fee_inr: 1500
    fee_waiver:
      spend_inr: 50000
      cycle: annual
      conditions: "Annual fee waiver on retail spends of ₹50,000 in the preceding year."
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.5
    cash_advance_fee:
      pct: 2.5
      min_inr: 300
    gst_applicable: true
    source:
      url: https://www.kotak.com/en/personal-banking/cards/credit-cards/ka-ching-6e-xl-reward-kotak-credit-card.html
      retrieved_on: 2026-04-22
      notes: "Joining fee ₹2,500, annual fee ₹1,500 per Paisabazaar + BankBazaar. Annual fee waiver on ₹50K retail spend."

rewards:
  - effective_from: 2024-07-01
    effective_until: null
    currency: miles
    currency_name: 6E Rewards
    base:
      rate: 2
      per_inr: 100
      unit_value_inr: 1.0
    accelerated:
      - category: indigo-flights-direct
        canonical_categories: [travel]
        multiplier: 1
        effective_rate: 6
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        merchants: [indigo-web, indigo-app]
        notes: "6 6E Rewards per ₹100 on IndiGo flight bookings — highest earn rate on any IndiGo co-brand."
      - category: dining-movies-grocery
        canonical_categories: [dining, entertainment, groceries]
        multiplier: 1
        effective_rate: 3
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        notes: "3 6E Rewards per ₹100 on dining, movies, and grocery spends."
    capping_rules:
      - "Card earns 2% on fuel — unlike most cards which exclude fuel from rewards."
    exclusions:
      - wallet-loads
      - rent
      - education
      - government
      - emi
    redemption:
      - type: voucher
        program: IndiGo flights + 6E Prime add-ons
        rate_inr_per_unit: 1.0
        constraints: "Redeemable only for IndiGo bookings and 6E Prime add-ons at 1:1. No airline / hotel transfer partners."
    source:
      url: https://cardinsider.com/kotak/6e-rewards-xl-indigo-kotak-credit-card/
      retrieved_on: 2026-04-22

benefits:
  - effective_from: 2024-07-01
    effective_until: null
    lounge_access:
      domestic:
        visits_per_cycle: 2
        cycle: quarterly
        guests_per_visit: 0
        via: [dreamfolks]
        notes: "2 complimentary domestic lounge visits per quarter (8 per year total) via Dreamfolks."
    welcome:
      - condition: "Joining fee paid"
        benefit: "IndiGo air-ticket voucher worth ₹3,000 + 6E Prime add-ons worth ₹1,099"
        value_inr: 4099
        window_days: 90
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 500
      max_txn_inr: 3000
      cap_per_cycle_inr: 3500
      cycle: annual
    other:
      - name: IndiGo priority check-in
        description: Priority check-in counter access on IndiGo bookings.
      - name: IndiGo preferred seat selection
        description: Complimentary preferred seat selection on IndiGo bookings.
      - name: IndiGo baggage assistance
        description: Baggage assistance services at select airports via IndiGo.
      - name: 6E Prime add-ons on welcome
        description: Priority check-in, seat selection, in-flight meal, and assistance — bundled as 6E Prime add-ons worth ₹1,099 on first transaction.
        value_inr: 1099
    concierge: false
    source:
      url: https://cardinsider.com/kotak/6e-rewards-xl-indigo-kotak-credit-card/
      retrieved_on: 2026-04-22

eligibility:
  min_age: 18
  max_age: 65
  income_inr_annual:
    salaried: 600000
    self_employed: 600000
  credit_score_min: 750
  residency: resident-indian

application:
  apply_url: https://www.kotak.com/en/personal-banking/cards/credit-cards/ka-ching-6e-xl-reward-kotak-credit-card.html

metadata:
  last_verified_on: 2026-04-22
  maintainers: []
  tags: [co-branded, airline, indigo, premium, miles, fuel-rewards]
