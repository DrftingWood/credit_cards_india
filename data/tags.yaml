# Controlled vocabulary for metadata.tags on card files.
# scripts/validate.py errors on any tag not listed here — add new tags via
# a one-line PR to this file (same pattern as data/channels/known.yaml).
# Merged synonyms (do not reintroduce): mid-tier->mid, mid-premium/mass-premium->premium,
# lowest-tier->entry, forex-friendly->low-forex, invite-only-like->invite-like,
# everyday->everyday-spend, grocery->groceries, upi->upi-linkable.

