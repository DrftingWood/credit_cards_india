id: idfc-first-power
name: IDFC FIRST Power Credit Card
issuer: idfc-first
network: rupay
network_tier: platinum
tier: entry
card_type: credit
co_brand:
  partner: Hindustan Petroleum (HPCL)
  category: fuel
  partner_website: https://www.hindustanpetroleum.com
status: active
launched_on: 2022-09-01
discontinued_on: null

fees:
  - effective_from: 2022-09-01
    effective_until: null
    joining_fee_inr: 199
    annual_fee_inr: 199
    fee_waiver:
      spend_inr: 50000
      cycle: annual
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.5
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    source:
      url: https://www.idfcfirstbank.com/credit-card/power
      retrieved_on: 2026-04-15

rewards:
  - effective_from: 2022-09-01
    effective_until: null
    currency: points
    currency_name: Reward Points
    base:
      rate: 1.25
      per_inr: 150
      unit_value_inr: 0.25
    accelerated:
      - category: hpcl-fuel-via-hp-pay
        canonical_categories: [fuel]
        effective_rate: 21
        cap_per_cycle: 5000
        cap_unit: spend-inr
        cycle: monthly
        merchants: [hpcl-fuel-stations, hp-pay]
        notes: "21X (21 RP/₹150 ≈ 3.5% value) on HPCL fuel, on fuel spends up to ₹5,000/cycle (₹10,000 if via HP Pay). HP Pay additionally credits 6 Happy Coins/₹100 programme-side (~5% total, not modelled)."
      - category: grocery-utility
        canonical_categories: [groceries, utilities]
        effective_rate: 15
        cap_per_cycle: 4000
        cap_unit: spend-inr
        cycle: monthly
        notes: "15X (≈2.5% value) on grocery/utility spends up to ₹4,000/cycle."
      - category: fastag-recharge
        canonical_categories: [utilities]
        effective_rate: 1
        cap_per_cycle: "unlimited"
        cap_unit: points
        cycle: monthly
        notes: "FASTag cut to 1X with a 1% fee above ₹10,000/cycle effective 18-Jan-2026 (earlier ≈2.5% on ≤₹2,000/cycle — history not separately modelled)."
    exclusions:
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
    redemption:
      - type: statement-credit
        rate_inr_per_unit: 0.25
    source:
      url: https://www.paisabazaar.com/idfc-first-bank/idfc-first-hpcl-power-credit-card/
      retrieved_on: 2026-06-12
      notes: "2026-06 rewrite: verified HPCL structure (21X fuel / 15X grocery-utility with per-cycle spend caps); the earlier percent-style values were wrong. Welcome ₹250 voucher on first HPCL txn ≥₹250 (med, not modelled)."

benefits:
  - effective_from: 2022-09-01
    effective_until: null
    lounge_access: null
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 200
      max_txn_inr: 5000
      cap_per_cycle_inr: 200
      cycle: monthly
    concierge: false
    source:
      url: https://www.idfcfirstbank.com/credit-card/power
      retrieved_on: 2026-04-15

eligibility:
  min_age: 21
  max_age: 60
  income_inr_annual:
    salaried: 300000
    self_employed: 300000
  credit_score_min: 700
  residency: resident-indian

application:
  apply_url: https://www.idfcfirstbank.com/credit-card/power

metadata:
  last_verified_on: 2026-06-12
  last_swept_on: 2026-06-12
  tags: [co-branded, fuel, hpcl, rupay, entry]
