id: axis-select
name: Axis Bank Select Credit Card
issuer: axis
network: visa
network_tier: platinum
tier: premium
card_type: credit
co_brand: null
status: active
launched_on: 2015-01-01
discontinued_on: null

fees:
  - effective_from: 2015-01-01
    effective_until: null
    joining_fee_inr: 3000
    annual_fee_inr: 3000
    fee_waiver:
      spend_inr: 800000
      cycle: annual
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.6
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    notes: "Waiver and forex corrected 2026-06 (were wrongly ₹6L / 1.5%)."
    source:
      url: https://cardinsider.com/axis-bank/axis-bank-select-credit-card/
      retrieved_on: 2026-06-12

rewards:
