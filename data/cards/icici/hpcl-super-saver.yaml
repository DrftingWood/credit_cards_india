      - category: hpcl-fuel-via-hp-pay
        canonical_categories: [fuel]
        effective_rate: 4
        cap_per_cycle: 200
        cap_unit: cashback-inr
        cycle: monthly
        merchants: [hp-pay, hpcl-fuel-stations]
