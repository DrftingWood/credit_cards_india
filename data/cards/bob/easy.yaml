id: bob-easy
name: BoBcard Easy Credit Card
issuer: bob
network: visa
network_tier: classic
tier: entry
card_type: credit
co_brand: null
status: active
launched_on: 2019-01-01
discontinued_on: null

fees:
  - effective_from: 2019-01-01
    effective_until: null
    joining_fee_inr: 500
    annual_fee_inr: 500
    fee_waiver:
      spend_inr: 35000
      cycle: annual
      conditions: "Annual fee waived on ₹35k annual spends; joining fee waived on ₹6k spend within 60 days."
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.49
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    notes: "Lifetime-free card."
    source:
      url: https://www.bobcard.co.in/credit-card-types/easy
      retrieved_on: 2026-06-12
      notes: "2026-06 corrections: card is NOT lifetime-free (₹500 fee with waivers); base 1 RP/₹100 (was wrongly 5); 5X capped 1,000 RP/mo; ₹0.20/pt; BOBCARD Ltd rebrand URLs."

rewards:
  - effective_from: 2019-01-01
    effective_until: null
    currency: points
    currency_name: Reward Points
    base:
      rate: 1
      per_inr: 100
      unit_value_inr: 0.2
      unit_value_inr_realized: 0.18
    accelerated:
      - category: departmental-stores-movies
        canonical_categories: [groceries, entertainment]
        effective_rate: 5
        cap_per_cycle: 1000
        cap_unit: points
        cycle: monthly
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
    redemption:
      - type: catalog
        program: BoBcard Rewards
        rate_inr_per_unit: 0.2
    source:
      url: https://www.bobcard.co.in/credit-card-types/easy
      retrieved_on: 2026-06-12

benefits:
  - effective_from: 2019-01-01
    effective_until: null
    lounge_access: null
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 400
      max_txn_inr: 5000
      cap_per_cycle_inr: 250
      cycle: monthly
    concierge: false
    source:
      url: https://www.bobcard.co.in/credit-card-types/easy
      retrieved_on: 2026-06-12

eligibility:
  min_age: 21
  max_age: 65
  income_inr_annual:
    salaried: 240000
    self_employed: 240000
  credit_score_min: 700
  residency: resident-indian

application:
  apply_url: https://www.bobcard.co.in/credit-card-types/easy

metadata:
  last_verified_on: 2026-06-12
