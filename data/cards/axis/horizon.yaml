id: axis-horizon
name: Axis Bank Horizon Credit Card
issuer: axis
network: visa
network_tier: signature
tier: premium
card_type: credit
co_brand: null
status: active
launched_on: 2025-06-01  # approximate; Citi PremierMiles successor, ~mid-2025 (livefromalounge)
discontinued_on: null

fees:
  - effective_from: 2025-06-01
    effective_until: null
    joining_fee_inr: 3000
    annual_fee_inr: 3000
    fee_waiver: null
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.6
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    notes: "No spend-based fee waiver."
    source:
      url: https://cardinsider.com/axis-bank/axis-bank-horizon-credit-card/
      retrieved_on: 2026-06-12
      notes: "2026-06 corrections: no fee waiver (₹10L waiver was wrong); forex 3.5% (1.5% was wrong)."

rewards:
  - effective_from: 2025-06-01
    effective_until: null
    currency: miles
    currency_name: EDGE Miles
    base:
      rate: 2
      per_inr: 100
      unit_value_inr: 1.0
      unit_value_inr_realized: 0.5
    accelerated:
      - category: travel-edge-portal
        canonical_categories: [travel]
        effective_rate: 5
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        channel:
          required: true
          class: issuer-portal
          merchants: [edge-travel]
        notes: "5 EDGE Miles per ₹100 on direct airline and Axis Travel EDGE bookings. Rate fires only when routed through the EDGE portal."
      - category: international-spend
        canonical_categories: [international]
        effective_rate: 2
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - government
      - insurance-premiums
      - utilities
    capping_rules:
      - "Transfers to partners capped at 5,00,000 EDGE Miles per year."
    redemption:
      - type: airmiles
        program: Multiple (EDGE Miles transfer)
        ratio: "1:1"
        constraints: "1:1 to standard partners; 2:1 only to premium partners (British Airways, Finnair, Lotusmiles)."
      - type: catalog
        program: Axis Travel EDGE
        rate_inr_per_unit: 1.0
    source:
      url: https://cardinsider.com/axis-bank/axis-bank-horizon-credit-card/
      retrieved_on: 2026-06-12
      notes: "2026-06 corrections: transfer ratio is 1:1 standard / 2:1 premium (was wrongly 2:1 across the board); 5L miles/yr transfer cap added."

benefits:
  - effective_from: 2025-06-01
    effective_until: null
    lounge_access:
      domestic:
        visits_per_cycle: 8
        cycle: quarterly
        guests_per_visit: 0
        via: [visa]
        notes: "8 visits/quarter (32/yr) on the Visa variant (24/yr on Mastercard); no spend criterion."
      international:
        visits_per_cycle: 2
        cycle: quarterly
        guests_per_visit: 0
        via: [priority-pass]
        notes: "2 visits/quarter (8/yr) via Priority Pass; no spend criterion."
    welcome:
      - condition: "Spend ₹1,000 within 30 days"
        benefit: "5,000 EDGE Miles (plus 1,500 EDGE Miles on each renewal)"
        value_inr: 2500
        window_days: 30
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 400
      max_txn_inr: 4000
      cap_per_cycle_inr: 400
      cycle: monthly
    concierge: false
    source:
      url: https://cardinsider.com/axis-bank/axis-bank-horizon-credit-card/
      retrieved_on: 2026-06-12
      notes: "2026-06 corrections: lounge is 32 dom/yr + 8 intl/yr with no spend gate (was wrongly 8/4 with ₹50k gate); welcome is 5,000 miles (was 1,000)."

eligibility:
  min_age: 18
  max_age: 70
  income_inr_annual:
    salaried: 900000
    self_employed: 900000
  credit_score_min: 750
  residency: resident-indian

application:
  apply_url: https://www.axisbank.com/retail/cards/credit-card/horizon-credit-card

metadata:
  last_verified_on: 2026-06-12
  tags: [travel, miles, premium]
