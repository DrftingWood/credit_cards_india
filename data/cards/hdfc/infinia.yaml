    exclusions:
      - fuel
      - wallet-loads
      - rent
      - government
      - insurance-premiums
      - emi
    redemption:
      - type: catalog
        program: SmartBuy
        rate_inr_per_unit: 1.0
      - type: airmiles
        program: Multiple (Airmiles hub)
        ratio: "1:1"
    source:
      url: https://www.hdfcbank.com/personal/pay/cards/credit-cards/infinia-metal-edition
      retrieved_on: 2026-04-15
      notes: "Historical record; SmartBuy 10x era (cut to 5x in August 2025)."

  - effective_from: 2025-08-01
    effective_until: null
    currency: points
    currency_name: Reward Points
    base:
      rate: 5
      per_inr: 150
      unit_value_inr: 1.0
