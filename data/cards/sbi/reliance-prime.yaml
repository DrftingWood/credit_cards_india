id: sbi-reliance-prime
name: Reliance SBI Card PRIME
issuer: sbi
network: mastercard
network_tier: world
tier: premium
card_type: credit
co_brand:
  partner: Reliance Retail
  category: retail
  partner_website: https://www.reliancedigital.in
status: active
launched_on: 2021-06-01
discontinued_on: null

fees:
  - effective_from: 2021-06-01
    effective_until: 2024-10-31
    joining_fee_inr: 2999
    annual_fee_inr: 2999
    fee_waiver:
      spend_inr: 300000
      cycle: annual
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.5
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    source:
      url: https://www.sbicard.com/en/personal/credit-cards/shopping/reliance-sbi-card-prime.page
      retrieved_on: 2026-04-15
      notes: "Historical record; finance charge before the 1-Nov-2024 hike."

  - effective_from: 2024-11-01
    effective_until: null
    joining_fee_inr: 2999
    annual_fee_inr: 2999
    fee_waiver:
      spend_inr: 300000
      cycle: annual
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.75
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    source:
      url: https://cardinsider.com/blog/important-update-on-sbi-credit-cards-finance-charges-and-utility-bill-payments/
      retrieved_on: 2026-06-12
      notes: "Finance charge 3.75%/month on all unsecured SBI cards from 1-Nov-2024."

rewards:
  - effective_from: 2021-06-01
    effective_until: 2024-11-30
    currency: points
    currency_name: Reward Points
    base:
      rate: 4
      per_inr: 100
      unit_value_inr: 0.25
      unit_value_inr_realized: 0.22
    accelerated:
      - category: reliance-retail
        canonical_categories: [online]
        effective_rate: 10
        cap_per_cycle: "unlimited"
        cap_unit: points
        cycle: monthly
        merchants: [reliance-digital, ajio, reliance-smart, trends, netmeds, jiomart]
        notes: "10 Reward Points per ₹100 at Reliance Retail brands."
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
    redemption:
      - type: statement-credit
        rate_inr_per_unit: 0.25
      - type: voucher
        program: Reliance Retail gift vouchers
        rate_inr_per_unit: 0.25
    source:
      url: https://www.sbicard.com/en/personal/credit-cards/shopping/reliance-sbi-card-prime.page
      retrieved_on: 2026-04-15
      notes: "Historical record; structure before the 1-Dec-2024 exclusion wave."

  - effective_from: 2024-12-01
    effective_until: null
    currency: points
    currency_name: Reward Points
    base:
      rate: 4
      per_inr: 100
      unit_value_inr: 0.25
      unit_value_inr_realized: 0.22
    accelerated:
      - category: reliance-retail
        canonical_categories: [online]
        effective_rate: 10
        cap_per_cycle: "unlimited"
        cap_unit: points
        cycle: monthly
        merchants: [reliance-digital, ajio, reliance-smart, trends, netmeds, jiomart]
        notes: "10 Reward Points per ₹100 at Reliance Retail brands."
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
      - government
      - other
    capping_rules:
      - "From 1-Dec-2024: digital gaming spends earn no rewards; government-related spends excluded; utility payments above ₹50,000/cycle attract a 1% fee."
      - "Rent payments attract a ₹199 processing fee; third-party education payments a 1% fee (2024)."
    redemption:
      - type: statement-credit
        rate_inr_per_unit: 0.25
      - type: voucher
        program: Reliance Retail gift vouchers
        rate_inr_per_unit: 0.25
    source:
      url: https://www.business-standard.com/finance/personal-finance/sbi-card-update-no-reward-points-for-spending-on-digital-gaming-platforms-124120500479_1.html
      retrieved_on: 2026-06-12
      notes: "1-Dec-2024 wave: digital gaming earns nothing, government excluded, utility >₹50k 1% fee."

benefits:
  - effective_from: 2021-06-01
    effective_until: null
    lounge_access:
      domestic:
        visits_per_cycle: 8
        cycle: annual
        guests_per_visit: 0
        via: [dreamfolks]
      international:
        visits_per_cycle: 4
        cycle: annual
        guests_per_visit: 0
        via: [priority-pass]
    welcome:
      - condition: "Joining fee paid"
        benefit: "Reliance Retail e-voucher worth ₹3,000"
        value_inr: 3000
        window_days: 90
    milestones:
      - spend_inr: 75000
        cycle: annual
        benefit: "Reliance Retail voucher worth ₹1,500"
        value_inr: 1500
      - spend_inr: 150000
        cycle: annual
        benefit: "Reliance Retail voucher worth ₹2,250"
        value_inr: 2250
      - spend_inr: 300000
        cycle: annual
        benefit: "Reliance Retail voucher worth ₹5,000"
        value_inr: 5000
    movies:
      type: free
      partner: BookMyShow
      max_per_cycle: 1
      cycle: monthly
      cap_inr: 250
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 500
      max_txn_inr: 4000
      cap_per_cycle_inr: 250
      cycle: monthly
    concierge: false
    source:
      url: https://www.paisabazaar.com/sbi-bank/reliance-sbi-card-prime/
      retrieved_on: 2026-06-12
      notes: "2026-06 corrections: milestone ladder is ₹1,500/₹2,250/₹5,000 at 75k/1.5L/3L (was wrongly ₹7,000 @5L); free BMS ticket/month added; welcome additionally includes ~₹11,999 of Reliance brand discount vouchers."

eligibility:
  min_age: 21
  max_age: 65
  income_inr_annual:
    salaried: 600000
    self_employed: 600000
  credit_score_min: 750
  residency: resident-indian

application:
  apply_url: https://www.sbicard.com/en/personal/credit-cards/shopping/reliance-sbi-card-prime.page

