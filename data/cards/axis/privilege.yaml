id: axis-privilege
name: Axis Bank Privilege Credit Card
issuer: axis
network: visa
network_tier: signature
tier: premium
card_type: credit
co_brand: null
status: active
launched_on: 2010-01-01
discontinued_on: null

fees:
  - effective_from: 2010-01-01
    effective_until: null
    joining_fee_inr: 1500
    annual_fee_inr: 1500
    fee_waiver:
      spend_inr: 500000
      cycle: annual
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.6
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    source:
      url: https://www.axisbank.com/retail/cards/credit-card/privilege-credit-card
      retrieved_on: 2026-04-15
      notes: "Waiver corrected 2026-06 to ₹5L (was ₹2.5L; medium confidence — cardinsider)."

rewards:
  - effective_from: 2010-01-01
    effective_until: null
    currency: points
    currency_name: EDGE Reward Points
    base:
      rate: 10
      per_inr: 200
      unit_value_inr: 0.2
      unit_value_inr_realized: 0.18
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - government
      - insurance-premiums
    redemption:
      - type: catalog
        program: EDGE Rewards
        rate_inr_per_unit: 0.2
    source:
      url: https://www.axisbank.com/retail/cards/credit-card/privilege-credit-card
      retrieved_on: 2026-04-15

benefits:
  - effective_from: 2010-01-01
    effective_until: 2024-04-30
    lounge_access:
      domestic:
        visits_per_cycle: 8
        cycle: annual
        guests_per_visit: 0
        via: [dreamfolks]
      international:
        visits_per_cycle: 4
        cycle: annual
        guests_per_visit: 0
        via: [priority-pass]
    welcome:
      - condition: "Joining fee paid"
        benefit: "Yatra voucher worth ₹5,000"
        value_inr: 5000
        window_days: 90
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 400
      max_txn_inr: 4000
      cap_per_cycle_inr: 400
      cycle: monthly
    concierge: false
    source:
      url: https://www.axisbank.com/retail/cards/credit-card/privilege-credit-card
      retrieved_on: 2026-04-15
      notes: "Historical record; unconditional-lounge era. (Yatra ₹5,000 welcome and intl PP shown here were wrong — actual welcome 12,500 EDGE points; no intl lounge.)"

  - effective_from: 2024-05-01
    effective_until: 2025-06-19
    lounge_access:
      domestic:
        visits_per_cycle: 2
        cycle: quarterly
        guests_per_visit: 0
        via: [dreamfolks]
        spend_threshold_inr: 50000
        spend_threshold_cycle: quarterly
        notes: "2 visits/quarter, gated on ₹50k spend in the preceding 3 months (1-May-2024). No international/Priority Pass on this card."
    milestones:
      - spend_inr: 250000
        cycle: annual
        benefit: "10,000 EDGE Reward Points"
        value_inr: 1800
        reward_kind: points
        reward_units: 10000
    welcome:
      - condition: "Joining fee paid"
        benefit: "12,500 EDGE Reward Points"
        value_inr: 2500
        window_days: 90
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 400
      max_txn_inr: 4000
      cap_per_cycle_inr: 400
      cycle: monthly
    concierge: false
    source:
      url: https://cardinsider.com/axis-bank/axis-bank-privilege-credit-card/
      retrieved_on: 2026-06-12
      notes: "Historical record; pre-District-app benefits. 1-May-2024 lounge gating; welcome/milestone corrected; intl PP removed (was never current)."

  - effective_from: 2025-06-20
    effective_until: null
    lounge_access:
      domestic:
        visits_per_cycle: 2
        cycle: quarterly
        guests_per_visit: 0
        via: [dreamfolks]
        spend_threshold_inr: 50000
        spend_threshold_cycle: quarterly
        notes: "2 visits/quarter, gated on ₹50k spend in the preceding 3 months (1-May-2024). No international/Priority Pass on this card."
    milestones:
      - spend_inr: 250000
        cycle: annual
        benefit: "10,000 EDGE Reward Points"
        value_inr: 1800
        reward_kind: points
        reward_units: 10000
    welcome:
      - condition: "Joining fee paid"
        benefit: "12,500 EDGE Reward Points"
        value_inr: 2500
        window_days: 90
    movies:
      type: bogo
      partner: District app
      max_per_cycle: 1
      cycle: monthly
      cap_inr: 250
      notes: "BOGO up to ₹250 once a month via District app (added 20-Jun-2025)."
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 400
      max_txn_inr: 4000
      cap_per_cycle_inr: 400
      cycle: monthly
    concierge: false
    source:
      url: https://www.paisabazaar.com/credit-card/axis-bank-credit-card-changes-2025/
      retrieved_on: 2026-06-12
      notes: "20-Jun-2025: District app BOGO added."

eligibility:
  min_age: 18
  max_age: 70
  income_inr_annual:
    salaried: 600000
    self_employed: 600000
  credit_score_min: 730
  residency: resident-indian

application:
  apply_url: https://www.axisbank.com/retail/cards/credit-card/privilege-credit-card

metadata:
  last_verified_on: 2026-06-12
  tags: [premium, travel, points]
