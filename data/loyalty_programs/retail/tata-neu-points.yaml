unit_value_inr:
  face: 1.0
  realized: 0.9
  realized_source:
    method: midpoint
    range: [0.85, 1.0]
    notes: |
      PROVISIONAL — placeholder. The "1 NeuCoin = ₹1 across Tata brands"
      face value is widely advertised, but the realized haircut to 0.85-1.0
      (for per-cart redemption caps on some brands) is an unsourced
      estimate. Refine against a primary source on Tata Neu redemption
      mechanics.

earn:
  baseline:
    rate: 1.5
    per_inr: 100
    notes: "Standard NeuPass member earn on most Tata-Neu-routed spend (varies by brand 0.5-2%; midpoint used)."
  channels:
    - channel: cobrand-merchant
      merchants: [tata-neu]
      rate: 3.5
      per_inr: 100
      notes: "Top-up earn when transacting through the Tata Neu app on partnered Tata brands."

redemption_paths:
  - type: voucher
    program: Tata Neu ecosystem (Croma, BigBasket, AirAsia/Air India, Taj, Westside)
    rate_inr_per_unit:
      face: 1.0
      realized: 0.9
    constraints: "1 NeuCoin = ₹1 within the ecosystem; not transferable to airlines or hotels outside Tata."

