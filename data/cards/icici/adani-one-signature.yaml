        cap_unit: cashback-inr
        cycle: monthly
      - category: international-spend
        canonical_categories: [international]
        effective_rate: 2
        cap_per_cycle: "unlimited"
        cap_unit: cashback-inr
        cycle: monthly
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
    redemption:
