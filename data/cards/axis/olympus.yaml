network_tier: infinite
tier: super-premium
card_type: credit
co_brand: null
status: invite-only  # offered to Citi Prestige migrants / Burgundy Private clients, not open applications
launched_on: 2025-01-01  # approximate; Citi Prestige migration card, ~2025 (livefromalounge)
discontinued_on: null

fees:
  - effective_from: 2025-01-01
    effective_until: null
    joining_fee_inr: 20000
    annual_fee_inr: 20000
    fee_waiver: null
    forex_markup_pct: 1.8
    finance_charge_monthly_pct: 3.6
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
