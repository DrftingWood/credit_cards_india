        sum_insured_inr: 50000000
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 400
      max_txn_inr: 5000
      cap_per_cycle_inr: null
      cycle: monthly
    concierge: true
    source:
      url: https://cardinsider.com/axis-bank/axis-bank-olympus-credit-card/
      retrieved_on: 2026-06-12
      notes: "2026-06 corrections: welcome was wrongly 25,000 miles; golf was wrongly unlimited; guest visits capped 10/yr."

