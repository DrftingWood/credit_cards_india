id: kotak-indigo-xl
name: IndiGo Kotak XL Credit Card
issuer: kotak
network: mastercard
network_tier: world
tier: premium
card_type: credit
co_brand:
  partner: IndiGo
  category: airline
  partner_website: https://www.goindigo.in
status: active
launched_on: 2025-06-01
discontinued_on: null

# Premium variant of IndiGo's 2025 Kotak partnership — BluChip currency.
# Companion base variant at kotak/indigo.yaml.

fees:
  - effective_from: 2025-06-01
    effective_until: null
    joining_fee_inr: 3000
    annual_fee_inr: 3000
    fee_waiver: null
    forex_markup_pct: 2.5
    finance_charge_monthly_pct: 3.5
    cash_advance_fee:
      pct: 2.5
      min_inr: 300
    gst_applicable: true
    source:
      url: https://www.paisabazaar.com/kotak-mahindra-bank/indigo-kotak-xl-credit-card/
      retrieved_on: 2026-04-22
      notes: "Joining + annual fee ₹3,000 per Paisabazaar (2026-04-18 article). Forex markup 2.5% (preferential vs 3.5% on base variant)."

rewards:
  - effective_from: 2025-06-01
    effective_until: null
    currency: miles
    currency_name: IndiGo BluChips
    base:
      rate: 2
      per_inr: 100
      unit_value_inr: 1.0
    accelerated:
      - category: indigo-flights-direct
        canonical_categories: [travel]
        multiplier: 1
        effective_rate: 21
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        merchants: [indigo-web, indigo-app]
        notes: "Up to 21 IndiGo BluChips per ₹100 on IndiGo web/app bookings — combines 5 BluChips (card earn), 4 BluChips (channel earn), 8 BluChips (BluChip member earn), and up to 4 status-tier bonus. Highest earn rate on any IndiGo co-brand."
      - category: dining-entertainment
        canonical_categories: [dining, entertainment]
        multiplier: 1
        effective_rate: 2
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - education
      - government
      - utilities
      - emi
    redemption:
      - type: voucher
        program: IndiGo flights + 6E Prime add-ons
        rate_inr_per_unit: 1.0
        constraints: "Redeemable 1:1 on IndiGo bookings and 6E Prime add-ons only. No airline / hotel transfer partners."
    source:
      url: https://cardinsider.com/kotak/indigo-kotak-xl-credit-card/
      retrieved_on: 2026-04-22

