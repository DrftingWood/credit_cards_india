id: idfc-first-indigo
name: IndiGo IDFC FIRST Dual Credit Card
issuer: idfc-first
network: mastercard
network_tier: world
tier: premium
card_type: credit
co_brand:
  partner: IndiGo
  category: airline
  partner_website: https://www.goindigo.in
status: active
launched_on: 2025-08-18
discontinued_on: null

# Dual-network card — combines Mastercard (global acceptance, low forex)
# with a RuPay chip for UPI transactions in a single plastic. Launched
# 2025-08-18 as IndiGo × IDFC FIRST Bank partnership. Offered as either a
# ₹4,999 joining-fee card or a ₹0-fee variant secured against a ₹1L FD.

fees:
  - effective_from: 2025-08-18
    effective_until: null
    joining_fee_inr: 4999
    annual_fee_inr: 4999
    fee_waiver: null
    forex_markup_pct: 1.49
    finance_charge_monthly_pct: 3.5
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    notes: "Fee-based variant; FD-backed variant at ₹0 joining fee is available against a ₹1,00,000 fixed deposit pledge."
    source:
      url: https://www.idfcfirstbank.com/credit-card/indigo-credit-card
      retrieved_on: 2026-04-22

rewards:
  - effective_from: 2025-08-18
    effective_until: null
    currency: miles
    currency_name: IndiGo BluChips
    loyalty_program: indigo-bluchip
    base:
      rate: 1
      per_inr: 100
      unit_value_inr: 1.0
      unit_value_inr_realized: 0.5
    accelerated:
      - category: indigo-flights-direct
        canonical_categories: [travel]
        effective_rate: 22
        card_attributable_rate: 6
        card_attributable_per_inr: 100
        stacks_with_program: true
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        merchants: [indigo-web, indigo-app]
        channel:
          required: true
          class: cobrand-merchant
          merchants: [indigo-app, indigo-web]
        notes: "Up to 22 visible BluChips per ₹100 on IndiGo web/app bookings. ~6 is card-attributable; the rest stacks from BluChip baseline + channel + tier earn (joined via loyalty_program: indigo-bluchip). Headline of 22 assumes top-tier BluChip status."
      - category: dining-entertainment
        canonical_categories: [dining, entertainment]
        effective_rate: 3
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
    redemption:
      - type: voucher
        program: IndiGo flights + 6E Prime add-ons
        rate_inr_per_unit: 1.0
        constraints: "Redeemable 1:1 on IndiGo bookings and 6E Prime add-ons only. No airline / hotel transfer partners."
    source:
      url: https://www.business-standard.com/finance/personal-finance/every-swipe-counts-how-indigo-s-new-credit-card-can-cut-your-travel-costs-125081800470_1.html
      retrieved_on: 2026-04-22

benefits:
  - effective_from: 2025-08-18
    effective_until: null
    lounge_access: null
    welcome:
      - condition: "Joining fee paid"
        benefit: "5,000 IndiGo BluChips welcome voucher + 6E Eats voucher — renews on fee payment"
        value_inr: 5000
        window_days: 90
    milestones:
      - spend_inr: 200000
        cycle: annual
        benefit: "5,000 BluChips voucher (repeats at ₹5L / ₹8L / ₹10L / ₹12L annual spend)"
        value_inr: 2500
    insurance:
      - type: other
        sum_insured_inr: 25000
        conditions: "Flight and hotel cancellation coverage up to ₹25,000."
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 200
      max_txn_inr: 5000
      cap_per_cycle_inr: 300
      cycle: monthly
    other:
      - name: Dual network (Mastercard + RuPay)
        description: "Card combines Mastercard (global acceptance, 1.49% forex) with a RuPay chip for seamless UPI transactions — one of the few dual-network cards in the Indian market."
      - name: 6E Eats voucher
        description: Complimentary 6E Eats voucher redeemable on IndiGo in-flight meals as part of the welcome and renewal benefit.
    concierge: false
    source:
      url: https://www.idfcfirst.bank.in/content/dam/idfcfirstbank/pdf/credit-card/IndiGo-privileges-document.pdf
      retrieved_on: 2026-06-12
      notes: "2026-06 corrections: this card has NO lounge access (the 4/quarter + 4/yr entry was wrong); 5,000-BluChips milestone ladder at 2L/5L/8L/10L/12L per issuer PDF; fuel/rent/insurance earn 0.5 BluChips/₹100, not zero (med — exclusions left pending re-model)."

eligibility:
  min_age: 21
  max_age: 60
  income_inr_annual:
    salaried: 900000
    self_employed: 900000
  credit_score_min: 750
  residency: resident-indian
  notes: "FD-backed variant available for customers without credit history — ₹1L FD pledge unlocks the card."

application:
  apply_url: https://www.idfcfirstbank.com/credit-card/indigo-credit-card

metadata:
  last_verified_on: 2026-06-12
  tags: [co-branded, airline, indigo, premium, miles, bluchip, low-forex, dual-network]
