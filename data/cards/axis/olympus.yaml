    source:
      url: https://cardinsider.com/axis-bank/axis-bank-olympus-credit-card/
      retrieved_on: 2026-06-12
      notes: "2026-06 corrections: no fee waiver (₹25L waiver was wrong); forex 1.8% (0.99% was wrong)."

rewards:
  - effective_from: 2025-01-01
    effective_until: null
    currency: miles
    currency_name: EDGE Miles
    base:
      rate: 1
      per_inr: 100
      unit_value_inr: 1.0
      unit_value_inr_realized: 0.5
    accelerated:
      - category: international-spend
        canonical_categories: [international]
        effective_rate: 2
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        notes: "2 EDGE Miles per ₹100 on international spends (domestic earns the 1/₹100 base)."
    capping_rules:
      - "Total earning capped at 7,50,000 EDGE Miles per year."
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - insurance-premiums
      - utilities
      - education
    redemption:
      - type: airmiles
        program: Multiple (EDGE Miles transfer)
        ratio: "1:4"
        constraints: "1 EDGE Mile = 4 partner points/miles across transfer partners."
      - type: catalog
        program: Axis Travel EDGE
        rate_inr_per_unit: 1.0
    source:
      url: https://cardinsider.com/axis-bank/axis-bank-olympus-credit-card/
      retrieved_on: 2026-06-12
      notes: "2026-06 rewrite: base was wrongly 10/₹100 (real: 1/₹100 domestic, 2/₹100 international, 7.5L/yr cap); the earlier 30/₹100 Travel EDGE portal rate could not be verified and was removed; transfer ratio is 1:4, not 2:1."

benefits:
  - effective_from: 2025-01-01
    effective_until: null
    lounge_access:
      domestic:
        visits_per_cycle: unlimited
        cycle: annual
        guests_per_visit: 10
        via: [dreamfolks]
        notes: "Guest visits capped at 10/year across domestic + international."
      international:
        visits_per_cycle: unlimited
        cycle: annual
        guests_per_visit: 10
        via: [priority-pass]
        notes: "Guest visits capped at 10/year across domestic + international."
    golf:
