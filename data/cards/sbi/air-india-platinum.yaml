id: sbi-air-india-platinum
name: Air India SBI Platinum Credit Card
issuer: sbi
network: visa
network_tier: platinum
tier: entry
card_type: credit
co_brand:
  partner: Air India
  category: airline
  partner_website: https://www.airindia.com
status: on-hold  # discontinued for new issuance 10-Oct-2024 (cardinsider); existing holders continue
launched_on: 2013-01-01
discontinued_on: null

# NOTE: Post the Vistara-Air India merger (completed Nov-2024), Club Vistara
# miles converted to Air India Flying Returns. This card continues to issue
# under Air India Flying Returns.

fees:
  - effective_from: 2013-01-01
    effective_until: null
    joining_fee_inr: 1499
    annual_fee_inr: 1499
    fee_waiver: null
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.5
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    source:
      url: https://www.sbicard.com/en/personal/credit-cards/travel/air-india-sbi-platinum.page
      retrieved_on: 2026-04-15

rewards:
  - effective_from: 2013-01-01
    effective_until: 2025-03-30
    currency: miles
    currency_name: Flying Returns Miles
    loyalty_program: air-india-flying-returns
    base:
      rate: 2
      per_inr: 100
      unit_value_inr: 1.0
      unit_value_inr_realized: 0.5
    accelerated:
      - category: air-india-bookings
        canonical_categories: [travel]
        effective_rate: 10
        card_attributable_rate: 4
        card_attributable_per_inr: 100
        stacks_with_program: true
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        merchants: [air-india]
        channel:
          required: true
          class: cobrand-merchant
          merchants: [air-india-direct, vistara-direct]
        notes: "Up to 10 miles per ₹100 visible on Air India bookings, of which ~4 is card-attributable; the remainder stacks from Flying Returns baseline + channel + tier (joined via loyalty_program at calculator time)."
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
    redemption:
      - type: airmiles
        program: Air India Flying Returns
        ratio: "1:1"
        constraints: "Directly credited to Flying Returns account; redeemable for Air India / Star Alliance award tickets."
    source:
      url: https://www.sbicard.com/en/personal/credit-cards/travel/air-india-sbi-platinum.page
      retrieved_on: 2026-04-15
      notes: "Historical record; pre-31-Mar-2025 accelerator. Note: cardinsider cites the pre-cut visible rate as 15/₹100; the 10/₹100 modelled here was not re-verified before the cut."

  - effective_from: 2025-03-31
    effective_until: null
    currency: miles
    currency_name: Flying Returns Miles
    loyalty_program: air-india-flying-returns
    base:
      rate: 2
      per_inr: 100
      unit_value_inr: 1.0
      unit_value_inr_realized: 0.5
    accelerated:
      - category: air-india-bookings
        canonical_categories: [travel]
        effective_rate: 5
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        merchants: [air-india]
        channel:
          required: true
          class: cobrand-merchant
          merchants: [air-india-direct]
        notes: "Accelerator cut to 5 miles per ₹100 on Air India bookings effective 31-Mar-2025 (pre-cut sources cite 15 visible vs the 10 previously modelled — decomposition pending re-verification after the Maharaja Club rebrand)."
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
    redemption:
      - type: airmiles
        program: Air India Flying Returns
        ratio: "1:1"
        constraints: "Directly credited to Flying Returns account; redeemable for Air India / Star Alliance award tickets."
    source:
      url: https://cardinsider.com/blog/air-india-sbi-credit-cards-devaluation/
      retrieved_on: 2026-06-12
      notes: "31-Mar-2025 devaluation; card closed to new issuance 10-Oct-2024; accident insurance covers withdrawn 26-Jul-2025; Flying Returns rebranded Maharaja Club (programme file rename pending)."

benefits:
  - effective_from: 2013-01-01
    effective_until: null
    lounge_access: null
    welcome:
      - condition: "Joining fee paid"
        benefit: "5,000 Flying Returns miles"
        value_inr: 2500
        window_days: 90
    milestones:
      - spend_inr: 200000
        cycle: annual
        benefit: "2,000 bonus Flying Returns miles"
        value_inr: 1000
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 500
      max_txn_inr: 3000
      cap_per_cycle_inr: 100
      cycle: monthly
    concierge: false
    source:
      url: https://www.sbicard.com/en/personal/credit-cards/travel/air-india-sbi-platinum.page
      retrieved_on: 2026-04-15

eligibility:
  min_age: 21
  max_age: 65
  income_inr_annual:
    salaried: null
    self_employed: null
  credit_score_min: 720
  residency: resident-indian

application:
  apply_url: null

metadata:
  last_verified_on: 2026-06-12
  tags: [co-branded, airline, air-india, miles, entry]
