id: sbi-indigo
name: IndiGo SBI Card
issuer: sbi
network: visa
network_tier: signature
tier: mid
card_type: credit
co_brand:
  partner: IndiGo
  category: airline
  partner_website: https://www.goindigo.in
status: active
launched_on: 2025-09-27
discontinued_on: null

# Base variant of IndiGo × SBI Card partnership (launched Sept 2025).
# Uses BluChip loyalty. Companion premium variant at sbi/indigo-elite.yaml.

fees:
  - effective_from: 2025-09-27
    effective_until: null
    joining_fee_inr: 1499
    annual_fee_inr: 1499
    fee_waiver: null
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.5
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    source:
      url: https://www.sbicard.com/en/personal/credit-cards/travel/indigo-sbi-card.page
      retrieved_on: 2026-04-22
      notes: "Joining + annual fee ₹1,499 per SBI Card product page and Paisabazaar. No fee waiver on base variant."

rewards:
  - effective_from: 2025-09-27
    effective_until: null
    currency: miles
    currency_name: IndiGo BluChips
    loyalty_program: indigo-bluchip
    base:
      rate: 1
      per_inr: 100
      unit_value_inr: 1.0
      unit_value_inr_realized: 0.5
    accelerated:
      - category: indigo-flights-direct
        canonical_categories: [travel]
        effective_rate: 19
        card_attributable_rate: 3
        card_attributable_per_inr: 100
        stacks_with_program: true
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        merchants: [indigo-web, indigo-app]
        channel:
          required: true
          class: cobrand-merchant
          merchants: [indigo-app, indigo-web]
        notes: "Receipt-visible total can reach ~19 BluChips per ₹100 on IndiGo bookings via app/web. Of that, ~3 is the card's own contribution; the remainder (BluChip baseline + channel bonus + tier) comes from the loyalty programme and is stacked at calculator time via loyalty_program: indigo-bluchip."
      - category: hotels-travel
        canonical_categories: [travel]
        effective_rate: 2
        card_attributable_rate: 2
        card_attributable_per_inr: 100
        stacks_with_program: false
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        notes: "Card-side reward denominated in BluChips but does not stack with IndiGo programme earn (hotels don't earn BluChips just from holding the card)."
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - insurance-premiums
      - emi
    redemption:
      - type: voucher
        program: IndiGo flights + 6E Prime add-ons
        rate_inr_per_unit: 1.0
        constraints: "Redeemable 1:1 on IndiGo bookings and 6E Prime add-ons only. No airline / hotel transfer partners."
    source:
      url: https://www.paisabazaar.com/sbi-bank/indigo-sbi-credit-card/
      retrieved_on: 2026-04-22

benefits:
  - effective_from: 2025-09-27
    effective_until: null
    lounge_access: null
    welcome:
      - condition: "Joining fee paid"
        benefit: "2,500 IndiGo BluChips welcome voucher — renews annually on fee payment"
        value_inr: 2500
        window_days: 90
    fuel_surcharge_waiver:
      pct: 1.0
      min_txn_inr: 500
      max_txn_inr: 3000
      cap_per_cycle_inr: 100
      cycle: monthly
    concierge: false
    source:
      url: https://www.paisabazaar.com/sbi-bank/indigo-sbi-credit-card/
      retrieved_on: 2026-04-22
      notes: "Base variant — lounge access reserved for the Elite variant."

eligibility:
  min_age: 21
  max_age: 65
  income_inr_annual:
    salaried: 360000
    self_employed: 360000
  credit_score_min: 720
  residency: resident-indian
  notes: "Eligibility requires active IndiGo BluChip membership."

application:
  apply_url: https://www.sbicard.com/en/personal/credit-cards/travel/indigo-sbi-card.page

metadata:
  last_verified_on: 2026-04-22
  last_swept_on: 2026-06-12
  tags: [co-branded, airline, indigo, mid, miles, bluchip]
