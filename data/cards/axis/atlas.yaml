id: axis-atlas
name: Axis Bank Atlas Credit Card
issuer: axis
network: visa
network_tier: signature
tier: premium
card_type: credit
co_brand: null
status: on-hold
launched_on: 2022-08-01
discontinued_on: null

# NOTE: Axis quietly stopped accepting new Atlas applications around
# late-2025 (confirmed via customer care and community reports; no official
# press release). Existing cardholders are unaffected — hence on-hold, not
# discontinued. Sources: cardtrail.in/news/axis-atlas-discontinued-2026/,
# livefromalounge.com (Aug-2025), rewardmatrix.in.

fees:
  - effective_from: 2022-08-01
    effective_until: null
    joining_fee_inr: 5000
    annual_fee_inr: 5000
    fee_waiver: null
    forex_markup_pct: 3.5
    finance_charge_monthly_pct: 3.6
    cash_advance_fee:
      pct: 2.5
      min_inr: 500
    gst_applicable: true
    source:
      url: https://www.axisbank.com/retail/cards/credit-card/axis-bank-atlas-credit-card
      retrieved_on: 2026-04-15

rewards:
  - effective_from: 2022-08-01
    effective_until: 2025-06-19
    currency: miles
    currency_name: EDGE Miles
    base:
      rate: 2
      per_inr: 100
      unit_value_inr: 1.0
      unit_value_inr_realized: 0.5
    accelerated:
      - category: travel-edge-portal
        canonical_categories: [travel]
        effective_rate: 5
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        channel:
          required: true
          class: issuer-portal
          merchants: [edge-travel]
        notes: "5 EDGE Miles per ₹100 on travel bookings via Axis Travel EDGE. Rate fires only on bookings routed through the EDGE portal — direct/OTA bookings drop to base."
      - category: international-spend
        canonical_categories: [international]
        effective_rate: 2
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - government
      - insurance-premiums
      - utilities
    redemption:
      - type: airmiles
        program: Multiple (EDGE Miles transfer)
        ratio: "2:1"
        constraints: "Across 20+ airline/hotel partners."
      - type: catalog
        program: Axis Travel EDGE
        rate_inr_per_unit: 1.0
    source:
      url: https://www.axisbank.com/retail/cards/credit-card/axis-bank-atlas-credit-card
      retrieved_on: 2026-04-15
      notes: "Historical record; uncapped/ungrouped transfer partners before the 20-Jun-2025 revision."

  - effective_from: 2025-06-20
    effective_until: null
    currency: miles
    currency_name: EDGE Miles
    base:
      rate: 2
      per_inr: 100
      unit_value_inr: 1.0
      unit_value_inr_realized: 0.5
    accelerated:
      - category: travel-edge-portal
        canonical_categories: [travel]
        effective_rate: 5
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
        channel:
          required: true
          class: issuer-portal
          merchants: [edge-travel]
        notes: "5 EDGE Miles per ₹100 on travel bookings via Axis Travel EDGE. Rate fires only on bookings routed through the EDGE portal — direct/OTA bookings drop to base."
      - category: international-spend
        canonical_categories: [international]
        effective_rate: 2
        cap_per_cycle: "unlimited"
        cap_unit: miles
        cycle: monthly
    exclusions:
      - fuel
      - wallet-loads
      - rent
      - government
      - insurance-premiums
      - utilities
    capping_rules:
      - "Transfer partners split into Group A (capped 30,000 miles/year) and Group B (capped 1,20,000 miles/year); 1,50,000 miles/year combined."
      - "Marriott Bonvoy, Accor and Qatar Airways removed as transfer partners effective 2-Apr-2026; British Airways, Vietnam Airlines and Finnair added at weaker ratios (cardexpert.in)."
    redemption:
      - type: airmiles
        program: Multiple (EDGE Miles transfer)
        ratio: "2:1"
        constraints: "Group A partners capped 30,000 miles/yr; Group B capped 1,20,000 miles/yr; 1,50,000 total."
      - type: catalog
        program: Axis Travel EDGE
        rate_inr_per_unit: 1.0
    source:
      url: https://www.axisbank.com/docs/default-source/default-document-library/credit-cards/terms-and-conditions-atlas-credit-card.pdf
      retrieved_on: 2026-06-12
      notes: "20-Jun-2025 revision: transfer-partner groups and annual caps per Axis T&C PDF and Paisabazaar's Atlas devaluation tracker."

